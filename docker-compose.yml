version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: aura-backend
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Aura AI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-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}
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=aura_root
      - POSTGRES_PASSWORD=aura_secret
      - POSTGRES_DB=aura_db
      - MONGO_URL=mongodb://mongo:27017
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_PASSWORD=aura_neo_password
      - QDRANT_URL=http://qdrant:6333
      - MINIO_URL=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - neo4j
      - qdrant
      - minio
      - redis
    networks:
      - aura-network

  worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: aura-worker
    command: celery -A app.tasks.worker worker --loglevel=info
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-tu_clave_aqui}
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=aura_root
      - POSTGRES_PASSWORD=aura_secret
      - POSTGRES_DB=aura_db
      - MONGO_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_PASSWORD=aura_neo_password
    depends_on:
      - redis
      - postgres
      - mongo
    networks:
      - aura-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aura-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - aura-network

  postgres:
    image: postgres:15-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: aura_root
      POSTGRES_PASSWORD: aura_secret
      POSTGRES_DB: aura_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aura-network

  mongo:
    image: mongo:6
    container_name: aura-mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - aura-network

  neo4j:
    image: neo4j:5-community
    container_name: aura-neo4j
    environment:
      NEO4J_AUTH: neo4j/aura_neo_password
    volumes:
      - neo4j_data:/data
    networks:
      - aura-network

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: aura-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aura-network

  minio:
    image: minio/minio
    container_name: aura-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - aura-network

  redis:
    image: redis:7-alpine
    container_name: aura-redis
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  qdrant_data:
  minio_data:
